worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Web App (Nitro Server)
        location / {
            proxy_pass http://cybersec-masters:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Offline Supabase API Proxy
        # npx supabase start binds to 127.0.0.1:54321 on the host machine.
        # host.docker.internal allows this nginx container to reach the host.
        location /supabase-api/ {
            proxy_pass http://host.docker.internal:54321/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
        }
    }
}
