services:
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cybersec-masters

  cybersec-masters:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - VITE_ALLOWED_SIGNUP_DOMAINS=${VITE_ALLOWED_SIGNUP_DOMAINS}
      # Fallbacks
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOVABLE_API_KEY=${LOVABLE_API_KEY}
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-pull-model:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "
      echo 'Waiting for Ollama to be ready...';
      while ! curl -s http://ollama:11434/api/tags > /dev/null; do
        sleep 2;
      done;
      echo 'Ollama is ready. Pulling model...';
      curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"${OLLAMA_MODEL:-llama3}\"}';
      echo 'Model pulled.';
      "

volumes:
  ollama_data:
